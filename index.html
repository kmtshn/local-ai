<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Local VLM</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- LINE Seed JP (Google Fonts経由・404エラー解決済) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "LINE Seed JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a; 
            overscroll-behavior-y: none;
            background-image: radial-gradient(circle at top right, #1e293b, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a, transparent 40%);
            background-attachment: fixed;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-animate {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-footer {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }

        .md-content pre {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a7f3d0;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .md-content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #fbcfe8;
        }
        .md-content p { margin-bottom: 8px; }
        .md-content p:last-child { margin-bottom: 0; }
    </style>
</head>
<body class="text-slate-100 h-screen flex flex-col overflow-hidden selection:bg-indigo-500/30">

    <!-- ヘッダー -->
    <header class="glass-header p-4 flex justify-between items-center z-20 absolute top-0 w-full h-[72px]">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
                <h1 class="text-base font-bold tracking-wide text-slate-100">Local Vision AI</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wider uppercase" id="model-status">Not Loaded</p>
            </div>
        </div>
        <button id="show-setup-btn" class="bg-white/10 hover:bg-white/20 active:scale-95 text-slate-200 px-4 py-2 rounded-full text-sm font-bold transition-all border border-white/5 shadow-sm">
            セットアップ
        </button>
    </header>

    <!-- ★ セットアップ＆プログレス モーダル (全画面) ★ -->
    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-md transition-opacity duration-300">
        <div class="bg-slate-800 p-6 sm:p-8 rounded-[32px] border border-white/10 shadow-2xl w-full max-w-md msg-animate flex flex-col">
            
            <h3 class="text-xl font-bold text-white mb-2 text-center" id="modal-title">AIモデルの準備</h3>
            <p class="text-sm text-slate-400 mb-6 text-center leading-relaxed" id="modal-desc">
                スマホの性能に合わせてモデルを選んでください。
            </p>

            <!-- ステップ1: モデル選択 -->
            <div id="step-select-model" class="space-y-4">
                
                <!-- WebGPUエラー警告 (JSで制御) -->
                <div id="webgpu-error" class="hidden bg-red-900/30 border border-red-500/50 p-4 rounded-xl text-sm text-red-200 mb-4">
                    <span class="font-bold text-red-400">WebGPUがオフになっています</span><br>
                    Chromeのアドレスバーに <code class="bg-black/30 px-1 rounded">chrome://flags/#enable-unsafe-webgpu</code> を入力し、有効化(Enabled)して再起動してください。
                </div>

                <label class="block cursor-pointer relative" id="text-model-label">
                    <input type="radio" name="model-choice" id="text-model-radio" value="" class="peer sr-only" checked>
                    <div class="p-4 rounded-2xl border-2 border-slate-700 peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 transition-all hover:bg-slate-700/50">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-slate-100" id="text-model-name">テキストモデル (検索中...)</span>
                            <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full">スマホ推奨</span>
                        </div>
                        <p class="text-xs text-slate-400">テキスト専用・超軽量モデル。<br>メモリの少ないGalaxy A25 5Gでも動きやすいです。</p>
                    </div>
                </label>

                <label class="block cursor-pointer relative" id="vision-model-label">
                    <input type="radio" name="model-choice" id="vision-model-radio" value="" class="peer sr-only">
                    <div class="p-4 rounded-2xl border-2 border-slate-700 peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 transition-all hover:bg-slate-700/50">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-slate-100" id="vision-model-name">ビジョンモデル (検索中...)</span>
                            <span class="text-[10px] bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded-full">画像認識対応</span>
                        </div>
                        <p class="text-xs text-slate-400">画像も読めるマルチモーダル。かなり重いため、アプリが強制終了する可能性があります。</p>
                    </div>
                </label>

                <button id="start-download-btn" disabled class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:opacity-50 text-white font-bold py-3 rounded-2xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                    ダウンロードして開始
                </button>
            </div>

            <!-- ステップ2: ダウンロード中プログレス -->
            <div id="step-progress" class="hidden flex-col items-center w-full">
                <div class="relative w-16 h-16 mb-4">
                    <div class="absolute inset-0 rounded-full border-4 border-slate-700"></div>
                    <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
                </div>
                
                <p class="text-xs text-indigo-300 font-medium mb-4 text-center">
                    ※最初の0%のまま数十秒〜1分ほど待機することがあります。<br>画面を閉じずにお待ちください。
                </p>

                <div class="w-full">
                    <div class="flex justify-between items-end mb-2">
                        <p id="progress-text" class="text-[10px] text-slate-400 truncate max-w-[80%] text-left">通信を確立しています...</p>
                        <span id="progress-percent" class="text-lg font-bold text-indigo-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-3 overflow-hidden shadow-inner border border-white/5">
                        <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full transition-all duration-300 ease-out relative" style="width: 0%">
                            <div class="absolute top-0 left-0 w-full h-full bg-white/20 animate-pulse"></div>
                        </div>
                    </div>
                </div>

                <button id="retry-btn" class="hidden mt-6 bg-red-500/20 hover:bg-red-500/30 text-red-400 border border-red-500/30 px-6 py-2 rounded-full text-sm font-bold transition-all">
                    エラー：再試行する
                </button>
            </div>

        </div>
    </div>

    <!-- チャットエリア -->
    <main id="chat-container" class="flex-1 overflow-y-auto px-4 pt-[88px] pb-32 space-y-6 no-scrollbar scroll-smooth">
        <div class="flex items-start gap-3 msg-animate">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="bg-slate-800/80 backdrop-blur-sm rounded-2xl rounded-tl-none p-4 max-w-[85%] border border-white/5 shadow-sm text-sm leading-relaxed">
                <p>こんにちは。私はあなたのスマートフォン内で直接動作するAIです。<br><br>右上の「セットアップ」をタップして、モデルをロードしてください。</p>
            </div>
        </div>
    </main>

    <!-- 入力エリア -->
    <footer class="glass-footer fixed bottom-0 w-full z-20 px-4 pt-3 pb-4">
        <div class="max-w-4xl mx-auto relative">
            <div id="image-preview-container" class="hidden absolute bottom-[calc(100%+12px)] left-0">
                <div class="relative inline-block bg-slate-800 p-1.5 rounded-2xl border border-white/10 shadow-2xl msg-animate">
                    <img id="image-preview" src="" alt="プレビュー" class="h-24 w-auto rounded-xl object-cover">
                    <button id="clear-image-btn" class="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 active:scale-90 rounded-full w-7 h-7 flex items-center justify-center text-white shadow-lg transition-transform border-2 border-slate-900">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
            </div>

            <div class="flex items-end gap-2 bg-slate-800/50 rounded-3xl p-1.5 border border-white/10 focus-within:border-indigo-500/50 focus-within:bg-slate-800/80 transition-all">
                <input type="file" id="file-input" accept="image/*" class="hidden">
                <button id="camera-btn" disabled class="p-3 text-slate-400 hover:text-white disabled:opacity-40 rounded-full transition-colors shrink-0 active:scale-95 relative" title="画像を選択 (画像認識モデルのみ対応)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                </button>

                <textarea id="message-input" disabled rows="1" placeholder="メッセージを入力..." class="flex-1 bg-transparent border-none px-2 py-3 text-[15px] focus:outline-none focus:ring-0 resize-none disabled:opacity-50 no-scrollbar max-h-32 text-slate-100 placeholder-slate-500 font-medium" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>

                <button id="send-btn" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:opacity-50 text-white p-3 rounded-full transition-all shrink-0 active:scale-95 shadow-md shadow-indigo-600/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="translate-x-[1px] translate-y-[-1px]"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
        </div>
    </footer>

    <!-- WebLLM ロジック -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        let engine = null;
        let chatHistory = [];
        let currentBase64Image = null;
        let isGenerating = false;
        let selectedModelId = "";

        // UI要素
        const showSetupBtn = document.getElementById('show-setup-btn');
        const setupModal = document.getElementById('setup-modal');
        const stepSelectModel = document.getElementById('step-select-model');
        const stepProgress = document.getElementById('step-progress');
        const startDownloadBtn = document.getElementById('start-download-btn');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const webgpuError = document.getElementById('webgpu-error');
        
        const statusText = document.getElementById('model-status');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const retryBtn = document.getElementById('retry-btn');
        
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const cameraBtn = document.getElementById('camera-btn');
        const fileInput = document.getElementById('file-input');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const clearImageBtn = document.getElementById('clear-image-btn');

        // ★ 動的モデル取得ロジック ★
        // WebLLMに登録されているモデル一覧から、利用可能なモデルを自動検出します
        const allModels = webllm.prebuiltAppConfig.model_list.map(m => m.model_id);
        
        const textRadio = document.getElementById('text-model-radio');
        const textName = document.getElementById('text-model-name');
        const visionLabel = document.getElementById('vision-model-label');
        const visionRadio = document.getElementById('vision-model-radio');
        const visionName = document.getElementById('vision-model-name');

        // 軽量なテキストモデルを探す (Llama-3.2-1B などを優先)
        let foundTextModel = allModels.find(id => id.includes("Llama-3.2-1B-Instruct")) 
                          || allModels.find(id => id.includes("Qwen2.5-1.5B-Instruct"))
                          || allModels.find(id => id.includes("1B"));
                          
        // 画像認識モデル(VLM)を探す (Phi-3.5-vision や Qwen2-VL などを優先)
        let foundVisionModel = allModels.find(id => id.includes("Qwen2-VL-2B"))
                            || allModels.find(id => id.includes("Phi-3.5-vision"))
                            || allModels.find(id => id.toLowerCase().includes("vision") || id.includes("VL"));

        if (foundTextModel) {
            textRadio.value = foundTextModel;
            textName.innerText = foundTextModel.split('-')[0] + " (軽量テキスト)";
            startDownloadBtn.disabled = false; // 見つかったらボタンを有効化
        } else {
            textName.innerText = "テキストモデルが見つかりません";
            textRadio.disabled = true;
        }

        if (foundVisionModel) {
            visionRadio.value = foundVisionModel;
            visionName.innerText = foundVisionModel.split('-')[0] + " (画像認識対応)";
        } else {
            // 画像モデルがない場合は選択肢を隠す
            visionLabel.style.display = "none";
        }

        // WebGPUチェック
        if (!navigator.gpu) {
            webgpuError.classList.remove('hidden');
            startDownloadBtn.disabled = true;
            startDownloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
            statusText.innerText = "WebGPU Disabled";
        }

        // モーダル表示制御
        showSetupBtn.addEventListener('click', () => {
            setupModal.classList.remove('hidden');
            // アニメーション用に少し遅らせて不透明度を上げる
            setTimeout(() => setupModal.classList.remove('opacity-0'), 10);
        });

        async function initModel() {
            // 選択されたモデルを取得
            selectedModelId = document.querySelector('input[name="model-choice"]:checked').value;
            const isVisionModel = selectedModelId.includes("VL");

            // UI切り替え (選択画面 -> プログレス画面)
            stepSelectModel.classList.add('hidden');
            stepProgress.classList.remove('hidden');
            stepProgress.classList.add('flex');
            modalTitle.innerText = "ダウンロード中...";
            modalDesc.innerText = "キャッシュの確認などで、最初しばらく0%のまま停止しているように見える場合があります。";
            
            retryBtn.classList.add('hidden');
            progressBar.classList.remove('from-red-500', 'to-orange-500');
            progressBar.classList.add('from-indigo-500', 'to-purple-500');
            progressText.classList.replace('text-red-400', 'text-slate-400');
            progressPercent.classList.replace('text-red-400', 'text-indigo-400');
            progressText.innerText = "初期化リクエストを送信中...";
            
            const initProgressCallback = (report) => {
                progressText.innerText = report.text;
                if (report.progress) {
                    const percent = Math.round(report.progress * 100);
                    progressBar.style.width = `${percent}%`;
                    progressPercent.innerText = `${percent}%`;
                }
            };

            try {
                // ここで通信開始・待機が発生する
                engine = await webllm.CreateMLCEngine(selectedModelId, { 
                    initProgressCallback: initProgressCallback 
                });

                // ロード成功
                statusText.innerText = "Ready • " + (isVisionModel ? "Vision" : "Text-Only");
                statusText.classList.replace('text-slate-400', 'text-green-400');
                showSetupBtn.classList.add('hidden'); // ヘッダーボタンを隠す
                
                // モーダルをフェードアウトして閉じる
                setupModal.classList.add('opacity-0');
                setTimeout(() => {
                    setupModal.classList.add('hidden');
                }, 300);

                // UIの有効化
                messageInput.disabled = false;
                sendBtn.disabled = false;
                
                // ★重要: テキスト専用モデルを選んだ場合はカメラボタンを無効化する
                if (isVisionModel) {
                    cameraBtn.disabled = false;
                    addMessageToChat("System", "Qwen2-VLのロードが完了しました！画像を選択するか、テキストを入力してください。");
                } else {
                    cameraBtn.disabled = true;
                    cameraBtn.classList.add('opacity-20');
                    addMessageToChat("System", "Llama 3.2 (テキスト専用)のロードが完了しました！テキストを入力して話しかけてください。\n※このモデルは画像認識に対応していません。");
                }

            } catch (error) {
                console.error(error);
                modalTitle.innerText = "エラーが発生しました";
                modalDesc.innerText = "メモリ不足、または通信エラーの可能性があります。";
                
                progressText.innerText = error.message;
                progressText.classList.replace('text-slate-400', 'text-red-400');
                progressBar.classList.replace('from-indigo-500', 'from-red-500');
                progressBar.classList.replace('to-purple-500', 'to-orange-500');
                progressPercent.innerText = "Error";
                progressPercent.classList.replace('text-indigo-400', 'text-red-400');
                
                retryBtn.classList.remove('hidden');
                
                // ブラウザクラッシュ対策の案内
                if (error.message.includes("memory") || error.message.includes("allocation")) {
                    setTimeout(() => {
                        alert("【メモリ不足エラー】\nスマホのRAMが足りません。Chromeの他のタブをすべて閉じ、設定から「テキスト専用モデル (Llama 3.2)」を選び直して再試行してください。");
                        // 選択画面に戻す
                        stepSelectModel.classList.remove('hidden');
                        stepProgress.classList.add('hidden');
                        stepProgress.classList.remove('flex');
                        modalTitle.innerText = "AIモデルの準備";
                        modalDesc.innerText = "スマホの性能に合わせてモデルを選んでください。";
                    }, 500);
                }
            }
        }

        startDownloadBtn.addEventListener('click', initModel);
        retryBtn.addEventListener('click', initModel);

        // 画像処理 (リサイズ)
        cameraBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const MAX_SIZE = 512;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    currentBase64Image = canvas.toDataURL('image/jpeg', 0.8);
                    imagePreview.src = currentBase64Image;
                    imagePreviewContainer.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        clearImageBtn.addEventListener('click', () => {
            currentBase64Image = null;
            imagePreview.src = '';
            imagePreviewContainer.classList.add('hidden');
        });

        // メッセージ送信
        async function handleSend() {
            const text = messageInput.value.trim();
            if ((!text && !currentBase64Image) || !engine || isGenerating) return;

            messageInput.value = '';
            messageInput.style.height = '';
            
            const content = [];
            // 画像がある場合（VLMモデルでのみ発生するはず）
            if (currentBase64Image) {
                content.push({ type: "image_url", image_url: { url: currentBase64Image } });
                currentBase64Image = null;
                imagePreviewContainer.classList.add('hidden');
            }
            if (text) content.push({ type: "text", text: text });

            chatHistory.push({ role: "user", content: content });
            
            let displayHtml = '';
            if (content.some(c => c.type === 'image_url')) {
                const imgUrl = content.find(c => c.type === 'image_url').image_url.url;
                displayHtml += `<img src="${imgUrl}" class="max-h-40 rounded-xl mb-3 border border-white/20 shadow-sm w-auto">`;
            }
            if (text) displayHtml += `<p class="whitespace-pre-wrap">${escapeHTML(text)}</p>`;
            
            addMessageToChat("User", displayHtml, true);

            const aiMessageId = "msg-" + Date.now();
            addMessageToChat("AI", '<span class="animate-pulse text-slate-400">Thinking...</span>', false, aiMessageId);
            const aiMessageElement = document.getElementById(aiMessageId);

            isGenerating = true;
            sendBtn.disabled = true;
            cameraBtn.disabled = true;

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    temperature: 0.7,
                    max_tokens: 512,
                    stream: true,
                });

                let reply = "";
                for await (const chunk of chunks) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    reply += delta;
                    aiMessageElement.innerHTML = parseMarkdown(reply);
                    scrollToBottom();
                }
                chatHistory.push({ role: "assistant", content: reply });

            } catch (error) {
                aiMessageElement.innerHTML = `<span class="text-red-400">エラーが発生しました: ${error.message}</span>`;
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                // テキスト専用モデルの場合はカメラを無効のままにする
                if (selectedModelId.includes("VL")) {
                    cameraBtn.disabled = false;
                }
            }
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        function addMessageToChat(sender, htmlContent, isUser = false, id = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex items-end gap-3 msg-animate ${isUser ? 'flex-row-reverse' : ''}`;
            
            const avatarHtml = isUser 
                ? ''
                : `<div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 shadow-md mb-1"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>`;

            const bubbleClass = isUser 
                ? `bg-indigo-600 text-white rounded-[20px] rounded-br-[4px] px-4 py-3 max-w-[85%] shadow-md shadow-indigo-900/20 text-[15px]`
                : `bg-slate-800/80 backdrop-blur-sm border border-white/5 text-slate-100 rounded-[20px] rounded-bl-[4px] px-4 py-3 max-w-[85%] shadow-sm text-[15px] md-content`;

            const idAttr = id ? `id="${id}"` : '';

            wrapper.innerHTML = `
                ${avatarHtml}
                <div class="${bubbleClass} leading-relaxed tracking-wide">
                    <div ${idAttr}>${htmlContent}</div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function parseMarkdown(text) {
            let html = escapeHTML(text);
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong class="text-white font-bold">$1</strong>');
            return html;
        }
    </script>
</body>
</html>
